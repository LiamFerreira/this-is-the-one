<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Image Studio Pro</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:#fff;
  overflow:hidden;
}

.app{
  display:grid;
  grid-template-columns:320px 1fr;
  height:100vh;
}

.sidebar{
  background:#111a2e;
  padding:12px;
  overflow:auto;
}

canvas{
  width:100%;
  height:100%;
  background:#000;
}

.section{
  margin-bottom:14px;
  padding-bottom:10px;
  border-bottom:1px solid #2a3550;
}

button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:0;
  border-radius:8px;
  cursor:pointer;
}

input[type="range"]{width:100%}

.previewBar{
  position:absolute;
  bottom:0;
  left:320px;
  right:0;
  display:flex;
  gap:10px;
  padding:10px;
  background:#0f1730;
  overflow:auto;
}

.card{
  min-width:200px;
  background:#1a2542;
  padding:6px;
  border-radius:8px;
}

.small{
  font-size:12px;
  opacity:.8;
}
</style>
</head>

<body>

<div class="app">

  <div class="sidebar">

    <div class="section">
      <h3>Upload Images</h3>
      <input id="imgInput" type="file" multiple accept="image/*">
    </div>

    <div class="section">
      <h3>Watermark</h3>
      <input id="wmInput" type="file" accept="image/*">

      <label>Opacity</label>
      <input id="wmOpacity" type="range" min="0" max="1" step="0.01" value="0.6">

      <label>Size</label>
      <input id="wmSize" type="range" min="5" max="50" value="20">

      <label>Position</label>
      <select id="wmPos">
        <option value="br">Bottom Right</option>
        <option value="bl">Bottom Left</option>
        <option value="tr">Top Right</option>
        <option value="tl">Top Left</option>
      </select>
    </div>

    <div class="section">
      <h3>Export</h3>
      <select id="format">
        <option value="png">PNG</option>
        <option value="jpg">JPG</option>
        <option value="webp">WebP</option>
      </select>

      <button id="downloadAll">Download All</button>
      <button id="clear">Clear</button>
    </div>

  </div>

  <canvas id="c"></canvas>

</div>

<div class="previewBar" id="bar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W,H;
function resize(){
  W = canvas.width = window.innerWidth - 320;
  H = canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

// ---------------- STATE ----------------
let images = [];
let active = 0;

let crop = {x:0,y:0,zoom:1};
let dragging = false;
let start = {x:0,y:0};

let watermark = null;
let wm = {opacity:0.6,size:20,pos:"br"};

const outputs = [
  {w:1080,h:1350},
  {w:1080,h:1920},
  {w:1920,h:1080}
];

// ---------------- LOAD IMAGES ----------------
document.getElementById("imgInput").onchange = async e=>{
  images = [];
  for(let f of e.target.files){
    let img = new Image();
    img.src = URL.createObjectURL(f);
    await img.decode();
    images.push(img);
  }
  render();
  buildPreviews();
};

// ---------------- WATERMARK ----------------
document.getElementById("wmInput").onchange = async e=>{
  let f = e.target.files[0];
  if(!f) return;
  watermark = new Image();
  watermark.src = URL.createObjectURL(f);
  await watermark.decode();
  render();
  buildPreviews();
};

document.getElementById("wmOpacity").oninput = e=>{
  wm.opacity = +e.target.value;
  buildPreviews();
};

document.getElementById("wmSize").oninput = e=>{
  wm.size = +e.target.value;
  buildPreviews();
};

document.getElementById("wmPos").onchange = e=>{
  wm.pos = e.target.value;
  buildPreviews();
};

// ---------------- CROPPING ----------------
canvas.onmousedown = e=>{
  dragging = true;
  start.x = e.clientX;
  start.y = e.clientY;
};

window.onmouseup = ()=> dragging=false;

window.onmousemove = e=>{
  if(!dragging) return;
  crop.x += e.clientX - start.x;
  crop.y += e.clientY - start.y;
  start.x = e.clientX;
  start.y = e.clientY;
  render();
};

// zoom
canvas.onwheel = e=>{
  e.preventDefault();
  crop.zoom *= e.deltaY>0 ? 0.95 : 1.05;
  crop.zoom = Math.max(1,Math.min(6,crop.zoom));
  render();
};

// ---------------- DRAW ----------------
function draw(img,w,h){
  let scale = Math.max(w/img.width, h/img.height) * crop.zoom;
  let dw = img.width * scale;
  let dh = img.height * scale;

  let x = (w-dw)/2 + crop.x;
  let y = (h-dh)/2 + crop.y;

  ctx.drawImage(img,x,y,dw,dh);
}

// watermark
function drawWM(w,h){
  if(!watermark) return;

  ctx.globalAlpha = wm.opacity;

  let size = Math.min(w,h) * (wm.size/100);
  let ratio = watermark.width/watermark.height;

  let ww = size;
  let wh = size/ratio;

  let x=10,y=10;

  if(wm.pos==="br"){x=w-ww-10;y=h-wh-10;}
  if(wm.pos==="bl"){x=10;y=h-wh-10;}
  if(wm.pos==="tr"){x=w-ww-10;y=10;}
  if(wm.pos==="tl"){x=10;y=10;}

  ctx.drawImage(watermark,x,y,ww,wh);
  ctx.globalAlpha=1;
}

// ---------------- RENDER ----------------
function render(){
  ctx.clearRect(0,0,W,H);
  if(!images.length) return;

  let img = images[active];

  draw(img,W,H);
  drawWM(W,H);
}

canvas.addEventListener("click",()=> {
  active = (active+1)%images.length;
  render();
  buildPreviews();
});

// ---------------- EXPORT ----------------
function exportImage(img, size){
  let c = document.createElement("canvas");
  c.width = size.w;
  c.height = size.h;
  let cctx = c.getContext("2d");

  let scale = Math.max(size.w/img.width,size.h/img.height)*crop.zoom;

  let dw = img.width*scale;
  let dh = img.height*scale;

  let x = (size.w-dw)/2 + crop.x;
  let y = (size.h-dh)/2 + crop.y;

  cctx.drawImage(img,x,y,dw,dh);

  if(watermark){
    cctx.globalAlpha = wm.opacity;

    let s = Math.min(size.w,size.h)*(wm.size/100);
    let ww = s;
    let wh = s/(watermark.width/watermark.height);

    let wx=10,wy=10;
    if(wm.pos==="br"){wx=size.w-ww-10;wy=size.h-wh-10;}
    if(wm.pos==="bl"){wx=10;wy=size.h-wh-10;}
    if(wm.pos==="tr"){wx=size.w-ww-10;wy=10;}
    if(wm.pos==="tl"){wx=10;wy=10;}

    cctx.drawImage(watermark,wx,wy,ww,wh);
  }

  return c.toDataURL("image/jpeg",1.0);
}

// ---------------- PREVIEWS ----------------
function buildPreviews(){
  let bar = document.getElementById("bar");
  bar.innerHTML="";

  if(!images.length) return;

  for(let img of images){
    for(let s of outputs){
      let div = document.createElement("div");
      div.className="card";

      let url = exportImage(img,s);

      div.innerHTML=`
        <div class="small">${s.w}x${s.h}</div>
        <img src="${url}" style="width:100%">
        <button onclick="download('${url}','img.jpg')">Download</button>
      `;

      bar.appendChild(div);
    }
  }
}

function download(url,name){
  let a=document.createElement("a");
  a.href=url;
  a.download=name;
  a.click();
}

// ---------------- CLEAR ----------------
document.getElementById("clear").onclick=()=>{
  images=[];
  watermark=null;
  crop={x:0,y:0,zoom:1};
  render();
  document.getElementById("bar").innerHTML="";
};

// ---------------- INIT ----------------
render();
</script>

</body>
</html>
